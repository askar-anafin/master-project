<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Disease Diagnosis AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    
    <header class="glass-header">
        <div class="header-content">
            <div class="logo">
                <svg viewBox="0 0 24 24" width="32" height="32" stroke="currentColor" stroke-width="2" fill="none">
                    <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
                </svg>
                <h1>CardioAI Core</h1>
            </div>
            <p>Advanced Deep Learning for ECG Analysis</p>
        </div>
    </header>

    <main class="container">
        <section class="control-panel glass-panel">
            <div class="panel-header">
                <h2>Analysis Dashboard</h2>
                <div class="actions">
                    <button id="btn-sample" class="btn btn-primary">
                        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
                        Get Random Sample
                    </button>
                    <button id="btn-export" class="btn btn-primary" disabled>
                        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        Export JSON
                    </button>
                    <label for="file-upload" class="btn btn-secondary">
                        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                        Upload ECG (.json/.csv)
                    </label>
                    <input id="file-upload" type="file" accept=".json,.csv" style="display: none;" />
                    <button id="btn-predict" class="btn btn-accent" disabled>
                        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                        Run Diagnostics
                    </button>
                </div>
            </div>
            <div class="status-indicator">
                <span class="badge" id="sample-id-badge">No Sample Selected</span>
                <span class="badge badge-outline" id="true-diag-badge">True Labels: None</span>
            </div>
        </section>

        <section class="visualization-area glass-panel">
            <div class="ecg-container">
                <div class="ecg-header">
                    <h3>12-Lead ECG Signal (All 12 Leads Plotted)</h3>
                </div>
                <!-- Scrollable container displaying all 12 ECG leads -->
                <div class="canvas-wrapper">
                    <canvas id="ecg-canvas"></canvas>
                </div>
            </div>
        </section>

        <section class="results-area">
            <h2 class="section-title">Diagnostic Results</h2>
            <div id="models-grid" class="models-grid">
                <!-- Model cards will be injected here by JS -->
                <div class="empty-state">
                    <p>Run diagnostics to see results</p>
                </div>
            </div>
        </section>
    </main>

    <div id="loading-overlay" class="loading-overlay hidden">
        <div class="spinner"></div>
        <p>Analyzing ECG Signals...</p>
    </div>

    <script src="app.js"></script>
</body>
</html>
